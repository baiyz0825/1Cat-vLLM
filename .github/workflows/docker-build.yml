# Build and push 1Cat-vLLM Docker image (prebuilt wheel approach)
#
# Uses official release wheels — no GPU needed for CI builds.
#
# Triggers:
#   - Push tag v* (e.g. v1.0.0) -> builds and pushes tagged image
#   - Push to main branch       -> builds and pushes :latest
#   - Manual dispatch           -> builds with custom tag
#
# Registry: GitHub Container Registry (ghcr.io)

name: Build Docker Image

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Custom image tag (e.g. 1.0.0-dev)"
        required: false
        default: "latest"

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            # On tag push: v1.0.0 -> 1.0.0
            type=semver,pattern={{version}}
            # On tag push: v1.0.0 -> 1.0.0-cu128
            type=semver,pattern={{version}}-cu128
            # On main push: latest
            type=raw,value=latest,enable={{is_default_branch}}
            # On manual dispatch: custom tag
            type=raw,value=${{ github.event.inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.1cat
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
